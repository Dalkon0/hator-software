<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .splash {
      background: #0a0a0f;
      border: 1px solid rgba(255,200,0,0.3);
      border-radius: 24px;
      width: 420px; height: 240px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; position: relative; overflow: hidden;
      opacity: 0; transform: scale(0.9);
      animation: fadeIn 0.4s ease 0.1s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; transform: scale(1); }
    }
    .splash::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, #ffd000, transparent);
    }
    .splash::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,200,0,0.08) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .logo {
      font-size: 42px; font-weight: 800;
      color: #ffd000; letter-spacing: 6px;
      position: relative; z-index: 1;
      animation: glow 1.5s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(255,200,0,0.3); }
      to { text-shadow: 0 0 30px rgba(255,200,0,0.8), 0 0 60px rgba(255,200,0,0.3); }
    }
    .tagline {
      font-size: 12px; color: rgba(255,255,255,0.4);
      letter-spacing: 2px; text-transform: uppercase;
      position: relative; z-index: 1;
    }
    .loader-wrap {
      width: 200px; height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px; overflow: hidden;
      position: relative; z-index: 1;
    }
    .loader-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ffd000, #ffaa00);
      border-radius: 2px;
      animation: load 2s ease forwards 0.5s;
    }
    @keyframes load {
      0% { width: 0%; }
      30% { width: 35%; }
      60% { width: 65%; }
      85% { width: 85%; }
      100% { width: 100%; }
    }
    .status {
      font-size: 11px; color: rgba(255,255,255,0.25);
      position: relative; z-index: 1;
    }
    .version {
      position: absolute; bottom: 16px; right: 20px;
      font-size: 10px; color: rgba(255,255,255,0.2);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">HATOR</div>
    <div class="tagline">Gaming Software</div>
    <div class="loader-wrap">
      <div class="loader-bar"></div>
    </div>
    <div class="status" id="status">Ініціалізація...</div>
    <div class="version">v1.0.0</div>
  </div>
  <script>
    const statuses = [
      'Ініціалізація...',
      'Пошук пристроїв...',
      'Завантаження профілів...',
      'Готово!'
    ]
    let i = 0
    const el = document.getElementById('status')
    const interval = setInterval(() => {
      i++
      if (i < statuses.length) {
        el.innerText = statuses[i]
      } else {
        clearInterval(interval)
      }
    }, 600)
  </script>
</body>
</html>
